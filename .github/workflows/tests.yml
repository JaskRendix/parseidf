name: Python Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .      
          pip install pytest

      - name: Run tests
        run: pytest -q